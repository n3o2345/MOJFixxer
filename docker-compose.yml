# ═══════════════════════════════════════════════════════════════════════════════
#  MOJ Playlist Manager — TrueNAS Electric Eel Compatible Compose
#
#  1. Place this file AND the Dockerfile in the same directory on your NAS:
#       /mnt/System/APP_Configs/IPTV_Playlists/moveonjoy/
#
#  2. In TrueNAS UI → Apps → Custom App → Install via YAML, paste ONLY:
#       include:
#         - /mnt/System/APP_Configs/IPTV_Playlists/moveonjoy/docker-compose.yml
#
#  Dashboard : http://192.168.1.240:9001/
#  Playlist  : http://192.168.1.240:9001/playlist
# ═══════════════════════════════════════════════════════════════════════════════

services:
  moveonjoy-updater:
    container_name: iptv-moveonjoy

    # Build from the Dockerfile sitting in the same directory as this file.
    # All source (server.py, index.html) is base64-embedded in the Dockerfile —
    # no other source files are needed alongside it.
    build:
      context: .
      dockerfile: Dockerfile

    # Tag the locally built image
    image: moj-playlist:latest

    # Never attempt to pull from Docker Hub — always use the local build
    pull_policy: never

    environment:
      PYTHONUNBUFFERED: "1"
      TZ: America/Chicago

    ports:
      - "192.168.1.240:9001:8080"

    volumes:
      # Mount only the data directory so the volume doesn't shadow
      # server.py and web/ that are baked into the image.
      # config.json, input/output playlists, and logs persist here.
      - /mnt/System/APP_Configs/IPTV_Playlists/moveonjoy/data:/app

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/state"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
