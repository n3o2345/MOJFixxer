# ═══════════════════════════════════════════════════════════════════════════════
#  MOJFixxer — Docker Compose
#
#  Pre-built image from GHCR:
#    image: ghcr.io/n3o2345/mojfixxer:latest
#
#  OR build locally (recommended for TrueNAS — avoids GHCR pull):
#    image: mojfixxer:local
#    build: .
#
#  Dashboard : http://<host-ip>:9001/
#  Playlist  : http://<host-ip>:9001/playlist
# ═══════════════════════════════════════════════════════════════════════════════

services:
  mojfixxer:
    container_name: mojfixxer
    build: .
    # Swap the above two lines to pull from GHCR instead:
    # image: ghcr.io/n3o2345/mojfixxer:latest

    environment:
      PYTHONUNBUFFERED: "1"
      TZ: ${TZ:-America/Chicago}

    ports:
      - "${HOST_PORT:-9001}:8080"

    volumes:
      # TrueNAS Scale: use a host path so data survives app removal.
      # Change /mnt/pool/mojfixxer/data to your actual dataset path.
      - ${DATA_PATH:-./data-volume}:/app

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/state"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
